version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: exam_postgres
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: exam
      POSTGRES_DB: exam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: exam_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
